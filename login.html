<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Renov Disparador</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0f1117;
      --card:        #1a1d27;
      --border:      #2d3148;
      --accent:      #22c55e;
      --accent-dim:  #16a34a;
      --accent-glow: rgba(34,197,94,0.15);
      --red:         #ef4444;
      --text:        #f1f5f9;
      --text-2:      #94a3b8;
      --text-3:      #64748b;
      --radius:      14px;
      --radius-sm:   8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* Fundo animado */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 20%, rgba(34,197,94,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(34,197,94,0.05) 0%, transparent 60%);
      pointer-events: none;
    }

    .login-wrap {
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
    }

    /* Logo / header */
    .login-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .login-logo {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, var(--accent), #15803d);
      border-radius: 18px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 30px;
      box-shadow: 0 0 40px var(--accent-glow), 0 8px 32px rgba(0,0,0,0.4);
      margin-bottom: 20px;
    }

    .login-header h1 {
      font-size: 24px; font-weight: 800; letter-spacing: -0.5px;
      background: linear-gradient(90deg, #fff 60%, var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 6px;
    }

    .login-header p {
      font-size: 13px; color: var(--text-2);
    }

    /* Card */
    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 32px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.4);
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 11px; font-weight: 600;
      color: var(--text-2); margin-bottom: 8px;
      text-transform: uppercase; letter-spacing: 0.06em;
    }

    .input-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 13px; top: 50%; transform: translateY(-50%);
      font-size: 16px; pointer-events: none;
      opacity: 0.5;
    }

    input {
      width: 100%;
      background: #0f1117;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: inherit; font-size: 14px;
      padding: 12px 42px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .pw-toggle {
      position: absolute;
      right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--text-3); font-size: 16px; padding: 4px;
      transition: color 0.15s;
    }
    .pw-toggle:hover { color: var(--text-2); }

    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), var(--accent-dim));
      color: #000; font-family: inherit; font-size: 15px; font-weight: 700;
      border: none; border-radius: var(--radius-sm);
      padding: 14px; cursor: pointer;
      transition: all 0.15s; margin-top: 8px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-login:hover { filter: brightness(1.1); box-shadow: 0 0 24px var(--accent-glow); }
    .btn-login:active { transform: scale(0.98); }

    .error-banner {
      display: flex; align-items: center; gap: 10px;
      background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3);
      border-radius: var(--radius-sm); padding: 12px 14px;
      color: #fca5a5; font-size: 13px; margin-bottom: 20px;
      animation: shake 0.3s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    .footer-text {
      text-align: center;
      margin-top: 24px;
      font-size: 12px; color: var(--text-3);
    }

    .hidden { display: none !important; }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 24px 0 20px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .divider span { font-size: 11px; color: var(--text-3); white-space: nowrap; }
  </style>
</head>
<body>

<div class="login-wrap">

  <div class="login-header">
    <div class="login-logo">💬</div>
    <h1>Renov Disparador</h1>
    <p>Faça login para acessar o painel</p>
  </div>

  <div class="login-card">

    <!-- Erro de login (exibido via JS quando ?erro=1) -->
    <div class="error-banner hidden" id="error-banner">
      <span>🚨</span>
      <span>E-mail ou senha incorretos. Tente novamente.</span>
    </div>

    <form method="POST" action="/login" id="login-form">

      <div class="field">
        <label for="email">E-mail</label>
        <div class="input-wrap">
          <span class="input-icon">✉️</span>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="seu@email.com"
            autocomplete="email"
            required
          />
        </div>
      </div>

      <div class="field">
        <label for="password">Senha</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
          <button type="button" class="pw-toggle" id="pw-toggle" title="Mostrar/ocultar">👁</button>
        </div>
      </div>

      <button type="submit" class="btn-login">
        <span>Entrar</span>
        <span>→</span>
      </button>

    </form>

  </div>

  <div class="footer-text">
    Renov Disparador · Disparos em massa com inteligência
  </div>

</div>

<script>
  // Mostrar/ocultar senha
  document.getElementById('pw-toggle').onclick = () => {
    const inp = document.getElementById('password');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  };

  // Mostra banner de erro se ?erro=1 estiver na URL
  if (new URLSearchParams(window.location.search).get('erro')) {
    document.getElementById('error-banner').classList.remove('hidden');
  }
</script>

</body>
</html>
