<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Renov Disparador</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #080810;
      --card:        #10111e;
      --border:      #252840;
      --accent:      #f97316;
      --accent-dim:  #ea580c;
      --accent-glow: rgba(249,115,22,0.18);
      --red:         #ef4444;
      --text:        #f1f5f9;
      --text-2:      #94a3b8;
      --text-3:      #475569;
      --radius:      16px;
      --radius-sm:   10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }

    /* Blobs animados */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 70% 60% at 15% 10%, rgba(249,115,22,0.13) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 85% 85%, rgba(239,68,68,0.10) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 70% 20%, rgba(249,115,22,0.07) 0%, transparent 60%);
      animation: bgPulse 10s ease-in-out infinite alternate;
    }
    @keyframes bgPulse {
      0%   { opacity: 0.7; }
      100% { opacity: 1; }
    }

    .login-wrap {
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
    }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Logo / header */
    .login-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .login-logo {
      width: 72px; height: 72px;
      background: #fff;
      border-radius: 18px;
      display: inline-flex; align-items: center; justify-content: center;
      box-shadow: 0 0 0 1px rgba(249,115,22,0.3), 0 0 50px rgba(249,115,22,0.25), 0 8px 32px rgba(0,0,0,0.5);
      margin-bottom: 22px;
      padding: 8px; overflow: hidden;
    }
    .login-logo svg { width: 100%; height: 100%; }

    .login-header h1 {
      font-size: 26px; font-weight: 900; letter-spacing: -0.6px;
      background: linear-gradient(90deg, #fff 40%, var(--accent) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 6px;
    }

    .login-header p {
      font-size: 13px; color: var(--text-2); letter-spacing: 0.02em;
    }

    /* Card */
    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 32px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04);
      position: relative; overflow: hidden;
    }
    .login-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(249,115,22,0.4), transparent);
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 11px; font-weight: 600;
      color: var(--text-2); margin-bottom: 8px;
      text-transform: uppercase; letter-spacing: 0.06em;
    }

    .input-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 13px; top: 50%; transform: translateY(-50%);
      font-size: 16px; pointer-events: none;
      opacity: 0.5;
    }

    input {
      width: 100%;
      background: #0f1117;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: inherit; font-size: 14px;
      padding: 12px 42px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .pw-toggle {
      position: absolute;
      right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--text-3); font-size: 16px; padding: 4px;
      transition: color 0.15s;
    }
    .pw-toggle:hover { color: var(--text-2); }

    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), var(--accent-dim));
      color: #fff; font-family: inherit; font-size: 15px; font-weight: 700;
      border: none; border-radius: var(--radius-sm);
      padding: 14px; cursor: pointer;
      transition: all 0.2s cubic-bezier(.22,.68,0,1.2); margin-top: 8px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 4px 20px rgba(249,115,22,0.35);
    }
    .btn-login:hover { box-shadow: 0 6px 28px rgba(249,115,22,0.5); transform: translateY(-1px); }
    .btn-login:active { transform: scale(0.97); }

    .error-banner {
      display: flex; align-items: center; gap: 10px;
      background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3);
      border-radius: var(--radius-sm); padding: 12px 14px;
      color: #fca5a5; font-size: 13px; margin-bottom: 20px;
      animation: shake 0.3s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    .footer-text {
      text-align: center;
      margin-top: 24px;
      font-size: 12px; color: var(--text-3);
    }

    .hidden { display: none !important; }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 24px 0 20px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .divider span { font-size: 11px; color: var(--text-3); white-space: nowrap; }
  </style>
</head>
<body>

<div class="login-wrap">

  <div class="login-header">
    <div class="login-logo">
      <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id="stripes" patternUnits="userSpaceOnUse" width="4" height="4">
            <line x1="0" y1="0" x2="0" y2="4" stroke="#1a1a1a" stroke-width="1.8"/>
          </pattern>
          <clipPath id="renov-clip">
            <text x="2" y="46" font-family="Arial Black, sans-serif" font-weight="900" font-size="36" letter-spacing="-1">RENOV</text>
          </clipPath>
        </defs>
        <text x="2" y="46" font-family="Arial Black, sans-serif" font-weight="900" font-size="36" letter-spacing="-1" fill="#1a1a1a">RENOV</text>
        <rect x="0" y="0" width="80" height="55" fill="url(#stripes)" clip-path="url(#renov-clip)" opacity="0.55"/>
        <text x="2" y="66" font-family="Arial, sans-serif" font-weight="400" font-size="8" fill="#555" letter-spacing="0.3">Gestão e Digital</text>
      </svg>
    </div>
    <h1>Renov Disparador</h1>
    <p>Faça login para acessar o painel</p>
  </div>

  <div class="login-card">

    <!-- Erro de login (exibido via JS quando ?erro=1) -->
    <div class="error-banner hidden" id="error-banner">
      <span>🚨</span>
      <span>E-mail ou senha incorretos. Tente novamente.</span>
    </div>

    <form method="POST" action="/login" id="login-form">

      <div class="field">
        <label for="email">E-mail</label>
        <div class="input-wrap">
          <span class="input-icon">✉️</span>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="seu@email.com"
            autocomplete="email"
            required
          />
        </div>
      </div>

      <div class="field">
        <label for="password">Senha</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
          <button type="button" class="pw-toggle" id="pw-toggle" title="Mostrar/ocultar">👁</button>
        </div>
      </div>

      <button type="submit" class="btn-login">
        <span>Entrar</span>
        <span>→</span>
      </button>

    </form>

  </div>

  <div class="footer-text">
    Renov Disparador · Disparos em massa com inteligência
  </div>

</div>

<script>
  // Mostrar/ocultar senha
  document.getElementById('pw-toggle').onclick = () => {
    const inp = document.getElementById('password');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  };

  // Mostra banner de erro se ?erro=1 estiver na URL
  if (new URLSearchParams(window.location.search).get('erro')) {
    document.getElementById('error-banner').classList.remove('hidden');
  }
</script>

</body>
</html>
